version: "3.9"

services:
  neurocache:
    build:
      context: .
      dockerfile: Dockerfile
    image: neurocache/engine:latest
    container_name: neurocache
    ports:
      - "8080:8080"   # Dashboard + HTTP API
      - "6379:6379"   # RESP protocol (redis-cli compatible)
    environment:
      NEUROCACHE_MAX_MEMORY: 512mb
      NEUROCACHE_EVICTION_POLICY: ai-smart
      NEUROCACHE_SEMANTIC_THRESHOLD: "0.75"
      NEUROCACHE_LOG_LEVEL: info
      NEUROCACHE_CORS_ORIGINS: "*"
    volumes:
      - neurocache-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  neurocache-data:
