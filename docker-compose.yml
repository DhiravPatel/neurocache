version: "3.9"

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: neurocache-api
    ports:
      - "8080:8080"
      - "6379:6379"
    environment:
      NEUROCACHE_HTTP_PORT: 8080
      NEUROCACHE_RESP_PORT: 6379
      NEUROCACHE_MAX_MEMORY: 512mb
      NEUROCACHE_EVICTION_POLICY: ai-smart
      NEUROCACHE_SEMANTIC_THRESHOLD: "0.75"
      NEUROCACHE_LOG_LEVEL: info
      NEUROCACHE_CORS_ORIGINS: "http://localhost:5173,http://localhost:3000"
    volumes:
      - neurocache-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  neurocache-data:
